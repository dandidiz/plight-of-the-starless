<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ----------------------------------------------------------------- -->

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- Multiselect CSS -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-select@v1.14.0-beta2/dist/css/bootstrap-select.min.css">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


  <!-- ----------------------------------------------------------------- -->

  <!-- Custom CSS -->
  <link rel="stylesheet" type="text/css" href="/plight-of-the-starless/styles/css/charadex.css">

  <!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Monda:wght@400..700&family=Rajdhani:wght@300;400;500;600;700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>

<body id="charadex-body" class="d-flex">
  <!-- ----------------------------------------------------------------- -->
  <!-- Header                                                            -->
  <!-- ----------------------------------------------------------------- -->
  <div id="header"></div>
  <div class="loading text-primary"><span class="star fa-beat"></span></div>

  <!-- ----------------------------------------------------------------- -->
  <!-- Side Anchor Navs                                                  -->
  <!-- ----------------------------------------------------------------- -->
  <div id="anchor-nav" class="softload" style="display: none;">
    <div class="position-fixed to-top">
      <a href="#header">
        <i class="fa-solid fa-arrow-up fa-2xl" alt="Go to top."></i>
      </a>
    </div>
    <div class="position-fixed to-bottom">
      <a href="#footer">
        <i class="fa-solid fa-arrow-down fa-2xl" alt="Go to bottom."></i>
      </a>
    </div>
  </div>

  <!-- ----------------------------------------------------------------- -->
  <!-- Main Container                                                    -->
  <!-- ----------------------------------------------------------------- -->
  <div class="d-flex flex-md-row flex-column justify-content-center softload">
    <div class="load-html" data-source="/plight-of-the-starless/includes/sidebar.html"></div>
    <div id="main-content">
      <div class="d-flex mx-4">
        <h1 class="page-title"><a href="/plight-of-the-starless/characters">Characters</a></h1>
        <h1 class="ms-auto mt-auto text-end text-light">
          <a href="/plight-of-the-starless" data-bs-toggle="tooltip" data-bs-title="go home">
            <span class="star"></span>
          </a>
        </h1>
      </div>

      <div id="charadex-gallery" class="card border-0 mb-4 p-4">
        <div id="main-card" class="card-body star-border">

          <!-- ----------------------------------------------------------------- -->
          <!-- UI                                                                -->
          <!-- ----------------------------------------------------------------- -->
          <div id="search-options" class="mx-md-3 mx-0 mb-2">

            <!-- Faux Folders -->
            <div style="display:none;" id="charadex-folder-container">
              <div class="row mb-2" id="charadex-folders"></div>
              <!-- Button Item -->
              <div style="display:none;">
                <div class="col-md-4 col-6" id="charadex-folder">
                  <a class="btn btn-primary d-block" href=""></a>
                </div>
              </div>
            </div>

            <!-- Filters -->
            <div style="display:none;" id="charadex-filter-container">
              <div class="row mb-2 gy-2" id="charadex-filters"></div>
              <!-- Filter Item -->
              <div style="display: none;">
                <div class="col-md-4 col-12" id="charadex-filter">
                  <label class="px-2"></label>
                  <select class="form-control" multiple data-actions-box="true" data-icon-base="fa-solid"
                    data-tick-icon="fa-check"></select>
                </div>
              </div>
            </div>

            <!-- Search -->
            <div style="display:none;" id="charadex-search-container">
              <div class="row mb-2">
                <!-- Search Filter -->
                <div class="col-md-4 col-6" style="display: none;">
                  <label class="px-2" for="charadex-search-filter">Search for</label>
                  <select id="charadex-search-filter" class="form-control form-select"
                    aria-label="Select search parameter."></select>
                </div>
                <!-- Search Bar -->
                <div class="col">
                  <label class="px-2" for="charadex-search">Search</label>
                  <input class="form-control search" type="search" placeholder="Search" id="charadex-search"
                    aria-label="Input search.">
                </div>
              </div>
            
              <hr class="star">
            </div>

            <!-- ----------------------------------------------------------------- -->
            <!-- Pagination                                                        -->
            <!-- ----------------------------------------------------------------- -->
            <div style="display: none;" class="charadex-pagination-container">
              <nav class="d-flex justify-content-center align-items-center">
                <a class="btn-prev px-1"><i class="fa fa-chevron-left"></i></a>
                <ul class="pagination charadex-pagination charadex-pagination-top justify-content-center mb-0"></ul>
                <a class="btn-next px-1"><i class="fa fa-chevron-right"></i></a>
              </nav>
            </div>

            <!-- ----------------------------------------------------------------- -->
            <!-- Prev & Next Topbar                                                -->
            <!-- ----------------------------------------------------------------- -->
            <div style="display: none;" id="charadex-prevnext-container">
              <div class="row px-2 text-uppercase">
                <div class="col-6 px-1">
                  <a id="entryPrev" href=""><i class="fas fa-chevron-left me-2"></i><b><span></span></b></a>
                </div>
                <div class="col-6 px-1 text-end order-md-1">
                  <a id="entryNext" href=""><b><span></span></b><i class="fas fa-chevron-right ms-2"></i></a>
                </div>
              </div>
            </div>

          </div> <!-- End of ui -->


          <div id="gallery-card m-2">
            <!-- ----------------------------------------------------------------- -->
            <!-- List Items Render Here                                            -->
            <!-- ----------------------------------------------------------------- -->
            <div class="row charadex-list list g-2"></div>

            <!-- ----------------------------------------------------------------- -->
            <!-- Pagination                                                        -->
            <!-- ----------------------------------------------------------------- -->
            <div style="display: none;" class="charadex-pagination-container">
              <nav class="d-flex justify-content-center align-items-center">
                <a class="btn-prev px-1"><i class="fa fa-chevron-left"></i></a>
                <ul class="pagination charadex-pagination charadex-pagination-bottom justify-content-center mb-0"></ul>
                <a class="btn-next px-1"><i class="fa fa-chevron-right"></i></a>
              </nav>
            </div>

          </div> <!-- End of gallery-card -->
        </div> 
      </div> <!-- End of charadex-gallery -->
    </div> <!-- End of main-content -->
  </div>

  <!-- ----------------------------------------------------------------- -->
  <!-- Footer                                                            -->
  <!-- ----------------------------------------------------------------- -->
  <div class="load-html" data-source="/plight-of-the-starless/includes/footer.html"></div>

  <!-- ----------------------------------------------------------------- -->
  <!-- Repeat Items                                                      -->
  <!-- Do not remove 'display:none;'                                     -->
  <!-- ----------------------------------------------------------------- -->
  <div style="display:none;">
    <!-- --------------------------------------------------------------- -->
    <!-- Gallery Item - Character Thumb                                  -->
    <!-- --------------------------------------------------------------- -->
    <div class="col-md-3 col-6" id="charadex-gallery-item">
      <div class="card bg-body-tertiary h-100">
        <div class="card-header text-center d-flex">
          <div class="m-auto z-1">
            <a class="stretched-link profileid profilelink" href=""></a>
          </div>
        </div>
        <div class="card-body cd-gallery-card d-flex flex-column flex-fill">
          <img class="img-thumbnail img-fluid refthumbnail m-auto" src="" alt="Character thumbnail.">
        </div>
        <div class="card-footer text-muted">
          <div class="row">
            <div class="col-auto categorybadge"></div>
            <div class="col"><a class="player playerlink"></a></div>
          </div>
        </div>
      </div>
    </div> <!-- End of Character Thumb -->

    <!-- --------------------------------------------------------------- -->
    <!-- Gallery Profile - Character Card                                -->
    <!-- --------------------------------------------------------------- -->
    <div class="col-12" id="charadex-profile">

      <!-- Character Name -->
      <div class="row align-items-center">
        <div class="col-auto">
          <h1 class="text-info m-0"><span class="star"></span></h1>
        </div>
        <div class="col px-0">
          <hr class="border-info">
        </div>
        <div class="col-auto">
          <h1 class="m-0 profileid"></h1>
        </div>
        <div class="col px-0">
          <hr class="border-info">
        </div>
        <div class="col d-flex flex-column align-items-center ps-0">
          <a class="player playerlink"></a>
          <div class="categorybadge"></div>
        </div>
      </div>

      <!-- -------- -->
      <!-- Nav Tabs -->
      <!-- -------- -->
      <ul class="nav nav-pills nav-justified justify-content-center mb-2 m-n1" id="profile-tabs" role="tablist">
        <li class="nav-item p-1" role="presentation">
          <button class="nav-link active" id="item-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button"
            role="tab" aria-controls="profile" aria-selected="true">
            Profile
            </a>
        </li>
        <li class="nav-item p-1" role="presentation">
          <button class="nav-link" id="connections-tab" data-bs-toggle="tab" data-bs-target="#connections" type="button"
            role="tab" aria-controls="connections" aria-selected="false">
            Connections
            </a>
        </li>
      </ul>

      <!-- --------- -->
      <!-- Main Body -->
      <!-- --------- -->
      <div class="tab-content">

        <!-- --------- -->
        <!-- Profile  -->
        <!-- --------- -->
        <div class="tab-pane fade active show" id="profile" role="tabpanel" aria-labelledby="item-tab">

          <hr class="star">
          <!-- ---------------- -->
          <!-- Image and Basics -->
          <!-- ---------------- -->
          <h2 class="text-center mt-2" id="basics"><a href="#basics">Basics</a></h2>

          <div class="row p-md-3 p-2">

            <!-- image -->
            <div class="col-md-5 col-12 mx-auto d-flex justify-content-center align-items-center order-0">
              <div class="my-auto d-inline-block align-self-center position-relative">
                <img src="" class="m-1 img-fluid img-thumbnail refthumbnail" alt="Reference image.">
                <p class="text-center">
                  <a href="" class="reflink stretched-link" target="_blank">
                    reference <i class="fa-solid fa-arrow-up-right-from-square fa-xs"></i>
                  </a>
                </p>
              </div>
            </div>
            <hr class="d-md-none d-block">

            <!-- Basics -->
            <div class="col order-1">
              <!-- identity rows -->

              <div class="row align-items-center mb-2">
                <div class="col-4 ps-0 text-end text-truncate span-header">
                  Name
                </div>
                <div class="col-8 text-center card border-0 rounded-1">
                  <span class="name"></span>
                </div>
              </div>
              <div class="row align-items-center mb-2">
                <div class="col-4 ps-0 text-end text-truncate span-header">
                  Alias
                </div>
                <div class="col-8 text-center card border-0 rounded-1">
                  <span class="alias"></span>
                </div>
              </div>
              <div class="row align-items-center mb-2">
                <div class="col-4 ps-0 text-end text-truncate span-header">
                  Age
                </div>
                <div class="col-8 text-center card border-0 rounded-1">
                  <span class="age"></span>
                </div>
              </div>
              <div class="row align-items-center mb-2">
                <div class="col-4 ps-0 text-end text-truncate span-header">
                  Gender
                </div>
                <div class="col-8 text-center card border-0 rounded-1">
                  <span class="gender"></span>
                </div>
              </div>
              <div class="row align-items-center mb-2">
                <div class="col-4 ps-0 text-end text-truncate span-header">
                  Pronouns
                </div>
                <div class="col-8 text-center card border-0 rounded-1">
                  <div class="col-auto pronounsbadge"></div>
                </div>
              </div>
              <div class="row align-items-center mb-2">
                <div class="col-4 ps-0 text-end text-truncate span-header">
                  Sexuality
                </div>
                <div class="col-8 text-center card border-0 rounded-1">
                  <span class="sexuality"></span>
                </div>
              </div>
              <div class="row align-items-center mb-2">
                <div class="col-4 ps-0 text-end text-truncate span-header">
                  Birthday
                </div>
                <div class="col-8 text-center card border-0 rounded-1">
                  <span class="birthday"></span>
                </div>
              </div>
              <div class="row align-items-center mb-2">
                <div class="col-4 ps-0 text-end text-truncate span-header">
                  Height
                </div>
                <div class="col-8 text-center card border-0 rounded-1">
                  <div><span class="metric"></span> | <span class="imperial"></span></div>
                </div>
              </div>
              <div class="row align-items-center mb-2">
                <div class="col-4 ps-0 text-end text-truncate span-header">
                  Playlist
                </div>
                <div class="col-8 text-center card border-0 rounded-1">
                  <a href="" class="playlistlink" target="_blank">
                    <i class="fa-solid fa-music"></i>
                    <i class="fa-solid fa-music"></i>
                    <i class="fa-solid fa-music"></i>
                  </a>
                </div>
              </div>

            </div> <!-- end of basic section -->

          </div> <!-- end of image and basic section -->

          <!-- ---------------- -->
          <!--   Personality    -->
          <!-- ---------------- -->
          <hr class="star star-right">
          <h2 class="text-center mt-2" id="personality"><a href="#personality">Personality</a></h2>

          <!-- Banner Info -->
          <div class="row mx-2 mb-2">
            <div class="col-md-4 col-12 text-center span-header p-1">
              <div class="card border-0 rounded-1">
                <p class="p-1 goodtraits text-success"></p>
              </div>
            </div>
            <div class="col-md-4 col-12 text-center span-header p-1">
              <div class="card border-0 rounded-1">
                <p class="p-1 neutraltraits"></p>
              </div>
            </div>
            <div class="col-md-4 col-12 rounded-1 text-center span-header p-1">
              <div class="card border-0 rounded-1">
                <p class="p-1 goodtraits badtraits text-danger"></p>
              </div>
            </div>
          </div>

          <div class="p-md-3 p-2 personality"></div>

          <!-- ----- -->
          <!-- Skills -->
          <!-- ----- -->
          <div id="item-gallery">
            <!-- ----- -->
            <!-- Title -->
            <!-- ----- -->
            <hr class="star star-left">
            <h2 class="text-center mt-2" id="skills"><a href="#skills">Skills</a></h2>

            <!-- ---------------------- -->
            <!-- List Items Render Here -->
            <!-- ---------------------- -->
            <div id="item-group"></div>

            <div style="display:none;">
              <!-- ------------ -->
              <!-- Gallery List -->
              <!-- ------------ -->
              <div class="mt-5 item-list-container" id="item-group-list">
                <h3 class="item-group-title"></h3>
                <div class="row m-n2 item-list list item-gallery-row justify-content-center align-items-center"></div>
              </div>

              <!-- ----------------------------------------------------------------- -->
              <!-- Gallery Items - Item Thumb                                        -->
              <!-- ----------------------------------------------------------------- -->
              <div class="col-md-3 col-6 p-2" id="item-gallery-item">
                <div class="card bg-body-tertiary h-100">
                  <div class="card-header text-center d-flex">
                    <div class="m-auto z-1">
                      <a class="stretched-link profileid profilelink" href=""></a>
                    </div>
                  </div>
                  <!-- Image -->
                  <div class="card-body d-flex flex-fill">
                    <img class="img-thumbnail img-fluid m-auto image" src="" alt="Item thumbnail.">
                  </div>
                  <!-- Quantity -->
                  <div class="card-footer text-muted text-center">
                    Qty: <span class="quantity"></span>
                  </div>
                </div>
              </div> <!-- End of Item Thumb -->

            </div>

          </div>

          <!-- ---------------- -->
          <!--       Lore       -->
          <!-- ---------------- -->
          <hr class="star star-right">
          <h2 class="text-center mt-2" id="lore"><a href="#lore">Lore</a></h2>
          <div class="p-md-3 p-2 lore"></div>

        </div>

        <!-- ------------- -->
        <!-- Relationships -->
        <!-- ------------- -->
        <div class="tab-pane fade" id="connections" role="tabpanel" aria-labelledby="connections-tab">
          <hr class="star">
          <h2 class="text-center mt-2">Connections</h2>

          <!-- list container -->
          <div id="rel-container" class="row m-n2 p-md-3 p-2 justify-content-center"></div>
        </div>

      </div>

    </div> <!-- End of Character Card -->

  </div> <!-- End of Repeat Items -->

  <!-- ----------------------------------------------------------------- -->

  <!-- JQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
    crossorigin="anonymous"></script>

  <!-- Showdown.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
